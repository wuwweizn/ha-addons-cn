name: Sync to GitCode

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to GitCode
        run: |
          git remote add gitcode https://wwzn:${{ secrets.GITCODE_TOKEN }}@gitcode.com/wwzn/ha-addons-cn.git
          git push gitcode main --force
